spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:diarytracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate        # flyway owns the schema, hibernate just validates
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.abssh.diary_tracker: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8070

jwt:
  secret: ${JWT_SECRET:jwt-secret}
  expiration-ms: 3600000