spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    com.abssh.diary_tracker: INFO

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false